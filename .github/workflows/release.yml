name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: scopewarden-aarch64-apple-darwin

          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: scopewarden-x86_64-apple-darwin

          # Linux x86_64 (static musl — works on any distro, no glibc dependency)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_name: scopewarden-x86_64-linux

          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            asset_name: scopewarden-aarch64-linux

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'musl')
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y musl-tools
          # ARM64 cross-compiler
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Unix)
        run: |
          cp target/${{ matrix.target }}/release/scopewarden ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}
          tar czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.asset_name }}

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}.tar.gz
          generate_release_notes: true

  # Also publish to crates.io on release
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
