# AgentScope configuration
# Docs: https://github.com/yourusername/agentscope
# Run `agentscope init --preset team` to generate a team config

version: 1

policy:
  # Paths that are ALWAYS blocked — agent writes here halt the session
  blocked:
    - ".env"
    - ".env.*"
    - "**/.env"
    - "**/.env.*"
    - "**/secrets/**"
    - "**/*.pem"
    - "**/*.key"
    - "src/auth/**"
    - "**/migrations/**"

  # Paths that trigger a warning but don't block
  warn:
    - "package-lock.json"
    - "yarn.lock"
    - "Cargo.lock"
    - "**/config/**"

  # 0 = disabled
  max_files_changed: 20
  max_lines_changed: 0

judge:
  enabled: true
  provider: ollama        # options: ollama | claude | openai | none
  model: "qwen3.5:2b"
  endpoint: "http://localhost:11434"

team:
  enabled: false
  share_logs: false
  # log_path: /shared/logs/agentscope
