version: 1
policy:
  allow:
  - src/chat.rs
  blocked:
  - .env
  - .env.*
  - '**/.env'
  - '**/.env.*'
  - '**/secrets/**'
  - '**/*.pem'
  - '**/*.key'
  - src/auth/**
  - '**/migrations/**'
  - src/judge.rs
  warn:
  - package-lock.json
  - yarn.lock
  - Cargo.lock
  - '**/config/**'
  max_lines_changed: 0
  max_files_changed: 20
judge:
  enabled: true
  provider: ollama
  model: qwen3.5:2b
  endpoint: http://localhost:11434
team:
  enabled: false
  share_logs: false
  log_path: null
agents:
  auto_detect: true
  auto_attach: false
  active_window_hours: 24
  preferred:
  - claude-code
  - codex
  - codex-app
  - opencode
  - openclaw
  - hermes
  - cursor
  - gemini-cli
  - antigravity
  - copilot-cli
  sources: {}
tui:
  theme: codex
